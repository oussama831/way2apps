<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 IF (SI)</title>
</head>

<body style="margin:0; font-family:Arial; background:#f5f7fb; direction:rtl;">

<!-- HEADER -->
<header style="background:#0f172a; color:white; text-align:center; padding:40px;">
  <h1>🧠 IF (SI)</h1>
  <p>الشروط المنطقية في Excel</p>
</header>

<div style="max-width:900px; margin:auto; padding:20px;">

  <!-- EXPLANATION -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">
    <h2>🧠 الشرح</h2>
    <p>
      دالة IF كتستعمل باش تدير شرط:
      إلا تحقق الشرط كيعطي نتيجة، وإلا لا كيعطي نتيجة أخرى.
    </p>
  </div>

  <!-- SYNTAX -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">
    <h2>📌 الصيغة</h2>
    <code>=IF(condition, value_if_true, value_if_false)</code>
  </div>

  <!-- VIDEO -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">

    <h2>🎥 فيديو شرح</h2>

    <iframe width="100%" height="315"
      src="https://www.youtube.com/embed/QODSYuOrB8A"
      title="Excel IF Tutorial"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>

    <p style="color:gray; font-size:13px;">
      🎯 شرح دالة IF في Excel
    </p>

  </div>

  <!-- INTERACTIVE EXAMPLE -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">

    <h2>📊 مثال تفاعلي (نجح / رسب)</h2>

    <input type="number" id="score" placeholder="دخل النقطة (0-20)" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">

    <button onclick="checkResult()" style="margin-top:10px; padding:12px 18px; background:#14b8a6; color:white; border:none; border-radius:10px;">
      🔍 تحليل النتيجة
    </button>

    <div id="result" style="margin-top:15px; font-size:20px; font-weight:bold;"></div>

  </div>

  <!-- EXAMPLE -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">
    <h2>📊 مثال Excel</h2>
    <p>=IF(A1>=10,"نجح","رسب")</p>
  </div>

  <!-- BACK -->
  <a href="/ma/tools/excel/" style="text-decoration:none;">
    <button style="padding:12px 18px; background:#3b82f6; color:white; border:none; border-radius:10px;">
      🔙 الرجوع
    </button>
  </a>

</div>

<script>

function checkResult(){

  let score = parseFloat(document.getElementById("score").value);

  if(isNaN(score)){
    document.getElementById("result").innerHTML = "⚠️ دخل رقم صحيح";
    return;
  }

  if(score >= 10){
    document.getElementById("result").innerHTML = "🟢 ناجح 🎉";
  } else {
    document.getElementById("result").innerHTML = "🔴 راسب";
  }

}

</script>

</body>
</html>
