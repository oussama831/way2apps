<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔗 CONCAT</title>
</head>

<body style="margin:0; font-family:Arial; background:#f5f7fb; direction:rtl;">

<!-- HEADER -->
<header style="background:#0f172a; color:white; text-align:center; padding:40px;">
  <h1>🔗 CONCAT</h1>
  <p>دمج النصوص في Excel</p>
</header>

<div style="max-width:900px; margin:auto; padding:20px;">

  <!-- EXPLANATION -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">
    <h2>🧠 الشرح</h2>
    <p>
      CONCAT كتستعمل لدمج النصوص (الأسماء، العناوين...) داخل خلية واحدة في Excel.
    </p>
  </div>

  <!-- SYNTAX -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">
    <h2>📌 الصيغة</h2>
    <code>=CONCAT(text1, text2)</code>
  </div>

  <!-- VIDEO -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">

    <h2>🎥 فيديو شرح</h2>

    <iframe width="100%" height="315"
      src="https://www.youtube.com/embed/.."
      title="Excel CONCAT Tutorial"
      frameborder="0"
      allowfullscreen>
    </iframe>

    <p style="color:gray; font-size:13px;">
      🎯 شرح دالة CONCAT في Excel
    </p>

  </div>

  <!-- INTERACTIVE EXAMPLE -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">

    <h2>📊 مثال تفاعلي</h2>

    <input type="text" id="first" placeholder="الاسم الأول" style="width:100%; padding:12px; margin-bottom:8px; border-radius:10px; border:1px solid #ddd;">

    <input type="text" id="last" placeholder="الاسم الأخير" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">

    <button onclick="mergeText()" style="margin-top:10px; padding:12px 18px; background:#14b8a6; color:white; border:none; border-radius:10px;">
      🔗 دمج النصوص
    </button>

    <div id="result" style="margin-top:15px; font-size:18px; font-weight:bold;"></div>

  </div>

  <!-- EXAMPLE -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">
    <h2>📊 مثال Excel</h2>
    <p>=CONCAT(A1," ",B1)</p>
  </div>

  <!-- BACK -->
  <a href="/ma/tools/excel/" style="text-decoration:none;">
    <button style="padding:12px 18px; background:#3b82f6; color:white; border:none; border-radius:10px;">
      🔙 الرجوع
    </button>
  </a>

</div>

<script>

function mergeText(){

  let first = document.getElementById("first").value;
  let last = document.getElementById("last").value;

  document.getElementById("result").innerHTML =
    "🟢 النتيجة: " + first + " " + last;

}

</script>

</body>
</html>
