<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔴 Advanced Excel</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  direction:rtl;
}

header{
  text-align:center;
  padding:50px 20px;
  background:#111827;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}

.card{
  background:#1f2937;
  padding:20px;
  border-radius:16px;
  transition:0.3s;
  cursor:pointer;
  border-left:4px solid #ef4444;
}

.card:hover{
  transform:translateY(-5px);
  background:#111827;
}

a{
  color:white;
  text-decoration:none;
}

p{color:#cbd5e1;}

</style>

</head>

<body>

<header>
  <h1>🔴 Advanced Excel</h1>
  <p>VBA - Pivot Tables - Dashboards</p>
</header>

<div class="container">

  <div class="grid">

    <a href="./vba/index.html">
      <div class="card">
        <h2>🧠 VBA (Macros)</h2>
        <p>أتمتة العمليات داخل Excel</p>
      </div>
    </a>

    <a href="./pivot/index.html">
      <div class="card">
        <h2>📊 Pivot Tables</h2>
        <p>تحليل البيانات بطريقة احترافية</p>
      </div>
    </a>

    <a href="./dashboard/index.html">
      <div class="card">
        <h2>📈 Dashboard</h2>
        <p>لوحة تحكم احترافية للبيانات</p>
      </div>
    </a>

  </div>

</div>

</body>
</html>
