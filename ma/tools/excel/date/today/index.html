<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📅 TODAY / NOW</title>
</head>

<body style="margin:0; font-family:Arial; background:#f5f7fb; direction:rtl;">

<!-- HEADER -->
<header style="background:#0f172a; color:white; text-align:center; padding:40px;">
  <h1>📅 TODAY / NOW</h1>
  <p>التاريخ والوقت في Excel</p>
</header>

<div style="max-width:900px; margin:auto; padding:20px;">

  <!-- EXPLANATION -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">
    <h2>🧠 الشرح</h2>
    <p>
      TODAY كتجيب التاريخ الحالي، و NOW كتجيب التاريخ + الوقت.
    </p>
  </div>

  <!-- SYNTAX -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">
    <h2>📌 الصيغة</h2>
    <p><code>=TODAY()</code></p>
    <p><code>=NOW()</code></p>
  </div>

  <!-- VIDEO -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">

    <h2>🎥 فيديو شرح</h2>

    <iframe width="100%" height="315"
      src="https://www.youtube.com/embed/ZgWCXVKIkfc"
      title="Excel TODAY NOW Tutorial"
      frameborder="0"
      allowfullscreen>
    </iframe>

    <p style="color:gray; font-size:13px;">
      🎯 شرح دوال التاريخ في Excel
    </p>

  </div>

  <!-- INTERACTIVE EXAMPLE -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">

    <h2>📊 مثال تفاعلي</h2>

    <button onclick="showDate()" style="padding:12px 18px; background:#14b8a6; color:white; border:none; border-radius:10px;">
      📅 عرض التاريخ والوقت
    </button>

    <div id="result" style="margin-top:15px; font-size:18px; font-weight:bold;"></div>

  </div>

  <!-- EXAMPLE -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">
    <h2>📊 مثال Excel</h2>
    <p>=TODAY() → يعطينا التاريخ الحالي</p>
    <p>=NOW() → يعطينا التاريخ + الوقت</p>
  </div>

  <!-- BACK -->
  <a href="/ma/tools/excel/" style="text-decoration:none;">
    <button style="padding:12px 18px; background:#3b82f6; color:white; border:none; border-radius:10px;">
      🔙 الرجوع
    </button>
  </a>

</div>

<script>

function showDate(){

  let now = new Date();

  document.getElementById("result").innerHTML =
    "📅 التاريخ والوقت الحالي: " + now.toLocaleString();

}

</script>

</body>
</html>
