<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🟣 FILTER (FILTRE)</title>
</head>

<body style="margin:0; font-family:Arial; background:#f5f7fb; direction:rtl;">

<!-- HEADER -->
<header style="background:#0f172a; color:white; text-align:center; padding:40px;">
  <h1>🟣 FILTER (FILTRE)</h1>
  <p>تصفية البيانات في Excel</p>
</header>

<div style="max-width:900px; margin:auto; padding:20px;">

  <!-- EXPLANATION -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">
    <h2>🧠 الشرح</h2>
    <p>
      دالة FILTER كتسمح لك تختار غير البيانات اللي كتطابق شرط معين.
    </p>
  </div>

  <!-- SYNTAX -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">
    <h2>📌 الصيغة</h2>
    <code>=FILTER(array, condition)</code>
  </div>

  <!-- VIDEO -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">

    <h2>🎥 فيديو شرح</h2>

    <iframe width="100%" height="315"
      src="https://www.youtube.com/embed/.."
      title="Excel FILTER Tutorial"
      frameborder="0"
      allowfullscreen>
    </iframe>

    <p style="color:gray; font-size:13px;">
      🎯 شرح دالة FILTER في Excel
    </p>

  </div>

  <!-- INTERACTIVE EXAMPLE -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">

    <h2>📊 مثال تفاعلي</h2>

    <p>فلترة الطلاب الناجحين (≥10):</p>

    <button onclick="filterStudents()" style="padding:12px 18px; background:#14b8a6; color:white; border:none; border-radius:10px;">
      🔍 عرض الناجحين
    </button>

    <div id="result" style="margin-top:15px; font-size:18px;"></div>

  </div>

  <!-- EXAMPLE -->
  <div style="background:white; padding:20px; border-radius:16px; margin-bottom:15px;">
    <h2>📊 مثال Excel</h2>
    <p>=FILTER(A2:B10, B2:B10>=10)</p>
  </div>

  <!-- BACK -->
  <a href="/ma/tools/excel/" style="text-decoration:none;">
    <button style="padding:12px 18px; background:#3b82f6; color:white; border:none; border-radius:10px;">
      🔙 الرجوع
    </button>
  </a>

</div>

<script>

const students = [
  {name:"أحمد", grade:12},
  {name:"محمد", grade:8},
  {name:"سارة", grade:15},
  {name:"يوسف", grade:9}
];

function filterStudents(){

  let resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "";

  let filtered = students.filter(s => s.grade >= 10);

  filtered.forEach(s => {
    resultDiv.innerHTML += "🟢 " + s.name + " (" + s.grade + ")<br>";
  });

}

</script>

</body>
</html>
