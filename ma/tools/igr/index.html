<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة IGR 🇲🇦</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<center>

<h1>📊 حاسبة IGR المغربية</h1>

<p>أدخل الراتب الشهري</p>

<input type="number" id="salary" oninput="calc()" placeholder="مثال: 6000">

<br><br>

<div style="width:320px; padding:15px; border:1px solid #ccc; border-radius:10px;">

<p>💰 السنوي: <span id="annual">0</span></p>
<p>📊 الضريبة: <span id="tax">0</span></p>
<p>📉 النسبة: <span id="rate">0%</span></p>

<hr>

<h2>💵 الصافي: <span id="net">0</span></h2>

</div>

<br>

<button onclick="downloadPDF()">⬇️ تحميل PDF</button>

<hr>
<!-- BACK -->
  <a href="../../index.html" style="text-decoration:none;">
    <button style="padding:12px 18px; background:#3b82f6; color:white; border:none; border-radius:10px;">
      🔙 الرجوع
    </button>
  </a>
  
</center>

<script>

let data = {};

function calc(){

  let salary = document.getElementById("salary").value;

  if(!salary || salary <= 0) return;

  salary = parseFloat(salary);

  let annual = salary * 12;

  let tax = 0;

  if(annual <= 30000) tax = 0;
  else if(annual <= 50000) tax = annual * 0.10;
  else if(annual <= 60000) tax = annual * 0.20;
  else if(annual <= 80000) tax = annual * 0.30;
  else tax = annual * 0.34;

  let netAnnual = annual - tax;
  let netMonthly = netAnnual / 12;
  let rate = (tax / annual) * 100;

  document.getElementById("annual").innerText = annual.toFixed(2);
  document.getElementById("tax").innerText = tax.toFixed(2);
  document.getElementById("rate").innerText = rate.toFixed(2) + "%";
  document.getElementById("net").innerText = netMonthly.toFixed(2);

  data = {
    salary,
    annual,
    tax,
    rate,
    netMonthly
  };
}

// PDF DOWNLOAD
function downloadPDF(){

  if(!data.salary){
    alert("دخل الراتب أولاً");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(16);
  doc.text("IGR CALCULATION REPORT 🇲🇦", 40, 20);

  doc.line(10, 25, 200, 25);

  doc.setFontSize(12);

  doc.text("Monthly Salary: " + data.salary + " MAD", 20, 40);
  doc.text("Annual Income: " + data.annual.toFixed(2) + " MAD", 20, 50);
  doc.text("Tax (IGR): " + data.tax.toFixed(2) + " MAD", 20, 60);
  doc.text("Tax Rate: " + data.rate.toFixed(2) + "%", 20, 70);

  doc.line(10, 80, 200, 80);

  doc.setFontSize(14);
  doc.text("Net Monthly Income: " + data.netMonthly.toFixed(2) + " MAD", 20, 100);

  doc.setFontSize(10);
  doc.text("Generated by Way2Apps 🇲🇦", 60, 140);

  doc.save("igr-report.pdf");
}

</script>

</body>
</html>
