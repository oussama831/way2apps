<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Dashboard PRO 🇲🇦</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body style="font-family: Arial; background:#f5f5f5;">

<center>

<div style="max-width:450px; background:white; padding:20px; margin-top:30px; border-radius:12px; box-shadow:0 0 10px #ddd;">

<h2>💱 لوحة العملات</h2>

<p id="status">⏳ Loading rates...</p>

<input type="number" id="amount" placeholder="المبلغ"
style="width:100%; padding:10px; margin:10px 0;">

<select id="from" style="width:100%; padding:10px;">
  <option value="MAD">MAD 🇲🇦</option>
  <option value="USD">USD 🇺🇸</option>
  <option value="EUR">EUR 🇪🇺</option>
  <option value="GBP">GBP 🇬🇧</option>
</select>

<br><br>

<select id="to" style="width:100%; padding:10px;">
  <option value="USD">USD 🇺🇸</option>
  <option value="MAD">MAD 🇲🇦</option>
  <option value="EUR">EUR 🇪🇺</option>
  <option value="GBP">GBP 🇬🇧</option>
</select>

<br><br>

<button id="btn" onclick="convert()" disabled
style="padding:10px 18px; border:none; background:#2d6cdf; color:white; border-radius:8px;">
🔄 تحويل
</button>

<hr>

<h2 id="result">---</h2>

<canvas id="chart" height="200"></canvas>

</div>
<hr>
<!-- BACK -->
  <a href="../../index.html" style="text-decoration:none;">
    <button style="padding:12px 18px; background:#3b82f6; color:white; border:none; border-radius:10px;">
      🔙 الرجوع
    </button>
  </a>
</center>

<script>

let rates = {};
let ready = false;
let chart;

async function loadRates(){

  try {

    let res = await fetch("https://open.er-api.com/v6/latest/USD");
    let data = await res.json();

    if(!data.rates){
      document.getElementById("status").innerText = "⚠️ API Error";
      return;
    }

    rates = {
      USD: 1,
      EUR: data.rates.EUR,
      GBP: data.rates.GBP,
      MAD: data.rates.MAD || 10
    };

    ready = true;

    document.getElementById("status").innerText = "✅ Live rates ready";
    document.getElementById("btn").disabled = false;

    drawChart();

  } catch(e){

    document.getElementById("status").innerText = "⚠️ Offline mode";

  }

}

// CONVERT SAFE
function convert(){

  if(!ready){
    alert("⏳ مازال كيتحمّل...");
    return;
  }

  let amount = parseFloat(document.getElementById("amount").value);
  let from = document.getElementById("from").value;
  let to = document.getElementById("to").value;

  if(isNaN(amount) || amount <= 0){
    alert("دخل مبلغ صحيح");
    return;
  }

  let inUSD = amount / rates[from];
  let result = inUSD * rates[to];

  document.getElementById("result").innerText =
    result.toFixed(2) + " " + to;

}

// CHART
function drawChart(){

  let ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["USD", "EUR", "GBP", "MAD"],
      datasets: [{
        label: "Rates vs USD",
        data: [1, rates.EUR, rates.GBP, rates.MAD],
        borderWidth: 1
      }]
    }
  });

}

loadRates();

</script>

</body>
</html>
