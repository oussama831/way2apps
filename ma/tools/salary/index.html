<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Calculator 🇲🇦</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<center>

<h1>🇲🇦 حاسبة الراتب المغربي</h1>

<input type="number" id="salary" oninput="calc()" placeholder="أدخل الراتب">

<br><br>

<button onclick="downloadPDF()">⬇️ Download Payslip</button>

<br><br>

<div style="width:320px; border:1px solid #ccc; padding:15px; border-radius:10px;">

<p>🏦 CNSS: <span id="cnss">0</span></p>
<p>🏥 AMO: <span id="amo">0</span></p>
<p>📊 IGR: <span id="igr">0</span></p>

<hr>

<h2>💰 NET: <span id="net">0</span></h2>

</div>

<!-- hidden QR container -->
<div id="qrcode" style="display:none;"></div>
<!-- BACK -->
  <a href="../../index.html" style="text-decoration:none;">
    <button style="padding:12px 18px; background:#3b82f6; color:white; border:none; border-radius:10px;">
      🔙 الرجوع
    </button>
  </a>
</center>

<script>

let data = {};

function calc(){

  let salary = document.getElementById("salary").value;
  if(!salary) return;

  salary = parseFloat(salary);

  let cnss = salary * 0.0429;
  let amo  = salary * 0.0226;

  let taxable = salary - (cnss + amo);
  let igr = taxable * 0.10;

  let net = salary - (cnss + amo + igr);

  document.getElementById("cnss").innerText = cnss.toFixed(2);
  document.getElementById("amo").innerText = amo.toFixed(2);
  document.getElementById("igr").innerText = igr.toFixed(2);
  document.getElementById("net").innerText = net.toFixed(2);

  data = {salary, cnss, amo, igr, net};
}

// PDF WITH QR
function downloadPDF(){

  if(!data.salary){
    alert("دخل الراتب أولاً");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // HEADER
  doc.setFontSize(16);
  doc.text("Way2Apps 🇲🇦", 80, 15);

  doc.setFontSize(14);
  doc.text("OFFICIAL PAYSLIP", 70, 25);

  doc.line(10, 30, 200, 30);

  // DATA
  doc.setFontSize(12);
  doc.text("Brut: " + data.salary + " MAD", 20, 45);
  doc.text("CNSS: " + data.cnss.toFixed(2), 20, 55);
  doc.text("AMO: " + data.amo.toFixed(2), 20, 65);
  doc.text("IGR: " + data.igr.toFixed(2), 20, 75);

  doc.line(10, 85, 200, 85);

  doc.setFontSize(14);
  doc.text("NET: " + data.net.toFixed(2) + " MAD", 20, 100);

  // CREATE QR
  let qrDiv = document.getElementById("qrcode");
  qrDiv.innerHTML = "";

  let qr = new QRCode(qrDiv, {
    text: "Way2Apps Salary Slip - Net: " + data.net,
    width: 80,
    height: 80
  });

  setTimeout(()=>{

    let img = qrDiv.querySelector("img");

    if(img){
      doc.addImage(img.src, "PNG", 130, 110, 40, 40);
    }

    // FOOTER
    doc.setFontSize(10);
    doc.text("Generated by Way2Apps 🇲🇦", 60, 170);

    doc.save("salary-payslip.pdf");

  }, 500);

}

</script>

</body>
</html>
