<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحويل صورة الى نص 🇲🇦</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

</head>

<body style="font-family: Arial; background:#f5f5f5;">

<center>

<div style="max-width:420px; background:white; padding:20px; margin-top:40px; border-radius:12px; box-shadow:0 0 10px #ddd;">

<h2>📄 تحويل صورة الى نص </h2>
<p style="color:gray;">حوّل الصورة إلى نص بسهولة</p>

<input type="file" id="imageInput" accept="image/*">

<br><br>

<button onclick="runOCR()"
style="padding:10px 18px; border:none; background:#2d6cdf; color:white; border-radius:8px; cursor:pointer;">
🔍 استخراج النص
</button>

<button onclick="downloadTXT()"
style="padding:10px 18px; border:none; background:#28a745; color:white; border-radius:8px; cursor:pointer; margin-top:10px;">
⬇️ تحميل النص
</button>

<hr>

<h3 style="text-align:left;">📊 النتيجة:</h3>

<pre id="output"
style="text-align:left; background:#f8f8f8; padding:10px; border-radius:8px; min-height:120px; white-space:pre-wrap;">
---
</pre>

</div>

<!-- BACK -->
  <a href="../../index.html" style="text-decoration:none;">
    <button style="padding:12px 18px; background:#3b82f6; color:white; border:none; border-radius:10px;">
      🔙 الرجوع
    </button>
  </a>
</center>

<script>

let finalText = "";

function runOCR(){

  let file = document.getElementById("imageInput").files[0];

  if(!file){
    alert("اختار صورة أولاً");
    return;
  }

  document.getElementById("output").innerText = "⏳ Processing...";

  Tesseract.recognize(file, 'eng+ara')
  .then(({ data: { text } }) => {

    finalText = text;

    document.getElementById("output").innerText = text;

  });

}

function downloadTXT(){

  if(!finalText){
    alert("ما كاين حتى نص");
    return;
  }

  let blob = new Blob([finalText], { type: "text/plain" });
  let link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "ocr-result.txt";

  link.click();
}

</script>

</body>
</html>
