<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Generator 🇲🇦</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body style="font-family: Arial; background:#f5f5f5;">

<center>

<div style="max-width:420px; background:white; padding:20px; margin-top:40px; border-radius:12px; box-shadow:0 0 10px #ddd;">

<h2>🔳 QR مولد</h2>

<p style="color:gray;">حوّل أي نص إلى QR Code</p>

<input type="text" id="text" placeholder="أدخل النص أو الرابط"
style="width:100%; padding:10px; margin:10px 0;">

<br>

<button onclick="generateQR()"
style="padding:10px 18px; border:none; background:#2d6cdf; color:white; border-radius:8px; cursor:pointer;">
🔍 توليد QR
</button>

<button onclick="downloadQR()"
style="padding:10px 18px; border:none; background:#28a745; color:white; border-radius:8px; cursor:pointer; margin-top:10px;">
⬇️ تحميل QR
</button>

<hr>

<div id="qrcode" style="margin-top:15px;"></div>

</div>
<!-- BACK -->
  <a href="../../index.html" style="text-decoration:none;">
    <button style="padding:12px 18px; background:#3b82f6; color:white; border:none; border-radius:10px;">
      🔙 الرجوع
    </button>
  </a>
</center>

<script>

function generateQR(){

  let text = document.getElementById("text").value;

  if(!text){
    alert("دخل نص أولاً");
    return;
  }

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: text,
    width: 180,
    height: 180
  });

}

// DOWNLOAD QR
function downloadQR(){

  let img = document.querySelector("#qrcode img");

  if(!img){
    alert("ولد QR أولاً");
    return;
  }

  let link = document.createElement("a");
  link.href = img.src;
  link.download = "qr-code.png";
  link.click();
}

</script>

</body>
</html>
