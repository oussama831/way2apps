<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNSS Calculator 🇲🇦</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<center>

<h1>🏦 حاسبة CNSS المغربية</h1>

<p>أدخل الراتب الشهري (Brut)</p>

<input type="number" id="salary" oninput="calc()" placeholder="مثال: 6000">

<br><br>

<div style="width:320px; padding:15px; border:1px solid #ccc; border-radius:10px;">

<p>📊 CNSS (4.29%): <span id="cnss">0</span></p>
<p>🏥 AMO (2.26%): <span id="amo">0</span></p>

<hr>

<h2>💰 المجموع المقتطع</h2>
<h2 id="total">0 MAD</h2>

</div>

<br>

<button onclick="downloadPDF()">⬇️ تحميل PDF</button>

<hr>
<!-- BACK -->
  <a href="../../index.html" style="text-decoration:none;">
    <button style="padding:12px 18px; background:#3b82f6; color:white; border:none; border-radius:10px;">
      🔙 الرجوع
    </button>
  </a>
</center>

<script>

let data = {};

function calc(){

  let salary = document.getElementById("salary").value;

  if(!salary || salary <= 0) return;

  salary = parseFloat(salary);

  let cnss = salary * 0.0429;
  let amo  = salary * 0.0226;

  let total = cnss + amo;

  document.getElementById("cnss").innerText = cnss.toFixed(2);
  document.getElementById("amo").innerText = amo.toFixed(2);
  document.getElementById("total").innerText = total.toFixed(2);

  data = {salary, cnss, amo, total};
}

// PDF EXPORT
function downloadPDF(){

  if(!data.salary){
    alert("دخل الراتب أولاً");
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(16);
  doc.text("CNSS REPORT 🇲🇦", 60, 20);

  doc.line(10, 25, 200, 25);

  doc.setFontSize(12);

  doc.text("Brut Salary: " + data.salary + " MAD", 20, 40);
  doc.text("CNSS (4.29%): " + data.cnss.toFixed(2) + " MAD", 20, 50);
  doc.text("AMO (2.26%): " + data.amo.toFixed(2) + " MAD", 20, 60);

  doc.line(10, 70, 200, 70);

  doc.setFontSize(14);
  doc.text("Total Deductions: " + data.total.toFixed(2) + " MAD", 20, 90);

  doc.setFontSize(10);
  doc.text("Generated by Way2Apps 🇲🇦", 60, 140);

  doc.save("cnss-report.pdf");
}

</script>

</body>
</html>
